    <style>
        /* ===== Brutalist-Avantgarde Design System (kr-neon-void) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0b0b;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Colors & Variables ===== */
        :root {
            --bg-primary: #0b0b0b;
            --bg-card: #161616;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #ff2a6d;
            --accent-hover: #ff5a8a;
            --border: #2a2a2a;
            --neon-glow: 0 0 8px rgba(255, 42, 109, 0.4);
            --brutal-shadow: 4px 4px 0 #ff2a6d;
            --container-max: 1280px;
            --header-height: 70px;
        }

        /* ===== Container ===== */
        .container {
            width: 100%;
            max-width: var(--container-max);
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== Header & Navigation ===== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(11, 11, 11, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: var(--header-height);
            display: flex;
            align-items: center;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo a {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }

        .logo a span {
            color: var(--accent);
        }

        .logo a small {
            font-size: 0.65rem;
            display: block;
            color: var(--text-secondary);
            letter-spacing: 0.3em;
            margin-top: -2px;
        }

        /* ===== Hamburger Menu ===== */
        .hamburger-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            padding: 5px;
            background: none;
            border: none;
        }

        .hamburger-menu span {
            display: block;
            width: 28px;
            height: 2px;
            background: var(--text-primary);
            transition: 0.3s;
        }

        .hamburger-menu.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger-menu.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger-menu.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
            align-items: center;
        }

        nav ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
            padding-bottom: 4px;
            letter-spacing: 0.02em;
        }

        nav ul li a:hover,
        nav ul li a.active {
            color: var(--accent);
        }

        nav ul li a.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
        }

        .cta-nav {
            background: var(--accent);
            color: #0b0b0b !important;
            padding: 8px 18px;
            border-radius: 0;
            font-weight: 700 !important;
            font-size: 0.85rem !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: 0.3s;
        }

        .cta-nav:hover {
            background: var(--accent-hover);
            box-shadow: var(--neon-glow);
        }

        /* ===== Main Content ===== */
        main {
            flex: 1;
            padding-top: calc(var(--header-height) + 40px);
            padding-bottom: 60px;
        }

        /* ===== Blog Hero Section ===== */
        .blog-hero {
            text-align: center;
            padding: 60px 0 30px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 50px;
        }

        .blog-hero h1 {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .blog-hero h1 span {
            color: var(--accent);
            display: block;
        }

        .blog-hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto;
        }

        /* ===== Blog Post Card (Single Article) ===== */
        .blog-post {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 40px;
            margin-bottom: 50px;
            position: relative;
            box-shadow: var(--brutal-shadow);
        }

        .blog-post::before {
            content: 'INFO';
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--accent);
            color: #0b0b0b;
            font-weight: 800;
            font-size: 0.7rem;
            padding: 2px 12px;
            letter-spacing: 0.15em;
        }

        .blog-post .meta {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
        }

        .blog-post .meta span {
            border-left: 2px solid var(--accent);
            padding-left: 10px;
        }

        .blog-post h2 {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .blog-post h2 span {
            color: var(--accent);
        }

        .blog-post p {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 1rem;
            line-height: 1.8;
        }

        .blog-post strong {
            color: var(--text-primary);
            font-weight: 700;
        }

        .blog-post .highlight-box {
            background: rgba(255, 42, 109, 0.08);
            border-left: 4px solid var(--accent);
            padding: 15px 20px;
            margin: 25px 0;
        }

        .blog-post .highlight-box p {
            margin-bottom: 0;
            font-weight: 600;
            color: var(--text-primary);
        }

        .blog-post ul {
            list-style: none;
            margin: 20px 0;
        }

        .blog-post ul li {
            padding-left: 25px;
            position: relative;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .blog-post ul li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 700;
        }

        .blog-post .cta-inline {
            display: inline-block;
            background: var(--accent);
            color: #0b0b0b;
            padding: 12px 30px;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            margin-top: 20px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .blog-post .cta-inline:hover {
            background: var(--accent-hover);
            box-shadow: var(--neon-glow);
        }

        /* ===== Sidebar / Extra Info (kept as card) ===== */
        .sidebar-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 30px;
            margin-top: 20px;
        }

        .sidebar-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
        }

        .sidebar-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        /* ===== Footer ===== */
        footer {
            border-top: 1px solid var(--border);
            padding: 40px 0 30px;
            text-align: center;
        }

        footer p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer .footer-phone {
            display: block;
            color: var(--accent);
            font-size: 1.3rem;
            font-weight: 800;
            margin: 10px 0;
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        footer .footer-phone:hover {
            text-shadow: var(--neon-glow);
        }

        footer small {
            color: #555;
            font-size: 0.7rem;
        }

        /* ===== Responsive 768 ===== */
        @media (max-width: 768px) {
            .responsive-768 .hamburger-menu {
                display: flex;
            }

            .responsive-768 nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: var(--header-height);
                left: 0;
                right: 0;
                background: rgba(11, 11, 11, 0.98);
                border-bottom: 1px solid var(--border);
                padding: 20px 0;
                gap: 15px;
            }

            .responsive-768 nav ul.open {
                display: flex;
            }

            .responsive-768 nav ul li a {
                font-size: 1rem;
                padding: 10px 20px;
            }

            .blog-hero h1 {
                font-size: 2rem;
            }

            .blog-post {
                padding: 25px;
            }

            .blog-post h2 {
                font-size: 1.5rem;
            }

            .blog-post .meta {
                flex-wrap: wrap;
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 15px;
            }

            .blog-hero h1 {
                font-size: 1.6rem;
            }

            .blog-post h2 {
                font-size: 1.3rem;
            }
        }
    </style>
